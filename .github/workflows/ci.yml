name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python files
        run: |
          python -m py_compile asr_eval.py generate_audio.py

      - name: Prepare CI audio files
        run: |
          rm -rf audio
          cp -r ci_test_audio audio

      - name: Run evaluation in mock mode
        env:
          USE_MOCK: "true"
          REFERENCE_FILE: "references/ci_references.json"
        run: python3 asr_eval.py

      - name: Validate real_asr function signature
        run: |
          python3 -c "
          from asr_eval import real_asr
          import inspect
          sig = inspect.signature(real_asr)
          params = list(sig.parameters.keys())
          assert params == ['audio_path', 'language_code'], f'Unexpected params: {params}'
          print('real_asr signature is correct')
          "